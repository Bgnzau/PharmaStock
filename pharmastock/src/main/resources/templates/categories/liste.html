<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaStock - Catégories</title>
    <!-- Bootstrap 5 -->
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .sidebar { position: fixed; top: 0; bottom: 0; left: 0; width: 260px; background-color: #1e293b; z-index: 100; padding-top: 24px; }
        .sidebar-brand { color: #fff; font-weight: 700; font-size: 1.25rem; padding: 0 24px; margin-bottom: 32px; }
        .nav-link-custom { display: flex; align-items: center; gap: 12px; color: #94a3b8; padding: 12px 24px; font-weight: 500; text-decoration: none; transition: all 0.2s ease; }
        .nav-link-custom:hover, .nav-link-custom.active { color: #fff; background-color: rgba(255, 255, 255, 0.05); border-left: 4px solid #10b981; }
        .main-content { margin-left: 260px; padding: 40px; }
        .table-card { border: none; border-radius: 12px; background-color: #fff; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }

        /* 📱 DESIGN RESPONSIVE POUR SMARTPHONES (Écrans < 768px) */
        @media screen and (max-width: 768px) {
            body {
                padding-top: 60px;
            }
            /* La sidebar devient un bandeau horizontal en haut */
            .sidebar {
                position: relative !important;
                width: 100% !important;
                height: auto !important;
                padding: 12px 0 !important;
            }
            .sidebar-brand {
                margin-bottom: 12px !important;
                text-align: center;
            }
            .sidebar nav {
                flex-direction: row !important;
                flex-wrap: wrap;
                justify-content: center;
                gap: 5px !important;
                padding: 0 10px;
            }
            .nav-link-custom {
                padding: 8px 12px !important;
                font-size: 0.85rem;
                border-left: none !important;
                border-bottom: 2px solid transparent;
            }
            .nav-link-custom:hover, .nav-link-custom.active {
                border-left: none !important;
                border-bottom: 2px solid #10b981;
            }
            
            /* L'espace de travail prend toute la largeur */
            .main-content {
                margin-left: 0 !important;
                padding: 20px !important;
            }
            
            /* Ajustement automatique des boutons et des headers alignés avec d-flex */
            .main-content > .d-flex {
                flex-direction: column;
                align-items: stretch !important;
                gap: 15px;
            }
            .main-content button, .main-content .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- 1. SIDEBAR FIXE À GAUCHE -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <i class="fa-solid fa-hospital-user text-success me-2"></i>PharmaStock
        </div>
        <nav class="d-flex flex-column gap-1">
            <a href="/" class="nav-link-custom">
                <i class="fa-solid fa-chart-pie"></i> Vue d'ensemble
            </a>
            <a href="/medicaments" class="nav-link-custom">
                <i class="fa-solid fa-capsules"></i> Médicaments
            </a>
            <a href="/categories" class="nav-link-custom active">
                <i class="fa-solid fa-tags"></i> Catégories
            </a>
            <a href="/ventes" class="nav-link-custom">
                <i class="fa-solid fa-cart-shopping"></i> Module Caisse
            </a>
        </nav>
    </div>

    <!-- 2. ESPACE DE TRAVAIL À DROITE -->
    <div class="main-content">
        
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark m-0">Gestion des Catégories</h2>
                <p class="text-muted small m-0">Organisez vos médicaments par familles thérapeutiques</p>
            </div>
            <!-- Bouton d'ajout de catégorie -->
            <button class="btn btn-success fw-semibold shadow-sm px-4" data-bs-toggle="modal" data-bs-target="#addCategorieModal">
                <i class="fa-solid fa-plus me-2"></i>Nouvelle Catégorie
            </button>
        </div>

        <!-- Table des catégories -->
        <div class="card table-card p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle m-0">
                    <thead class="table-light">
                        <tr class="text-muted small">
                            <th>ID</th>
                            <th>Nom de la catégorie</th>
                            <th class="text-end" sec:authorize="hasRole('ADMIN')">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cat : ${categories}">
                            <td class="text-muted small" th:text="${cat.id}">1</td>
                            <td>
                                <div class="fw-bold text-dark" th:text="${cat.nom}">Nom</div>
                            </td>
                            <!-- Actions réservées uniquement à l'ADMIN -->
                            <td class="text-end" sec:authorize="hasRole('ADMIN')">
                                <a th:href="@{/categories/modifier/{id}(id=${cat.id})}" class="btn btn-sm btn-outline-primary border-0 me-1" title="Modifier">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </a>
                                <a th:href="@{/categories/supprimer/{id}(id=${cat.id})}" class="btn btn-sm btn-outline-danger border-0" 
                                   onclick="return confirm('Attention, la suppression de cette catégorie peut impacter les médicaments liés. Confirmer ?');" title="Supprimer">
                                    <i class="fa-solid fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(categories)}">
                            <td colspan="3" class="text-center text-muted py-4">Aucune catégorie enregistrée. Cliquez sur "Nouvelle Catégorie" pour commencer.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- MODAL POUR AJOUT DIRECT -->
    <div class="modal fade" id="addCategorieModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 12px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="fw-bold text-dark">Ajouter une catégorie</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/categories/ajouter}" method="POST">
                    <div class="modal-body">
                        <div class="mb-2">
                            <label class="form-label small fw-medium text-secondary">Nom de la famille / catégorie</label>
                            <input type="text" name="nom" class="form-control" required placeholder="ex: Antibiotiques, Analgésiques...">
                        </div>
                    </div>
                    <div class="modal-footer border-0 pt-0">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Annuler</button>
                        <button type="submit" class="btn btn-success px-4">Enregistrer</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
