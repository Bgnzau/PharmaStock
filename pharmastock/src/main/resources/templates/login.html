<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaStock - Connexion</title>
    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Google Fonts (Inter) pour le style SaaS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            height: 100vh;
        }
        .login-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            background-color: #ffffff;
        }
        .btn-login {
            background-color: #10b981; /* Vert émeraude moderne */
            border: none;
            font-weight: 600;
            padding: 12px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            background-color: #059669;
            transform: translateY(-1px);
        }
        .form-control {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            background-color: #f9fafb;
        }
        .form-control:focus {
            background-color: #fff;
            border-color: #10b981;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }
        .brand-badge {
            background-color: rgba(16, 185, 129, 0.1);
            color: #059669;
            font-weight: 600;
            font-size: 0.75rem;
            padding: 6px 12px;
            border-radius: 50px;
            display: inline-block;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="container" style="max-width: 450px;">
        
        <div class="card login-card p-4 p-md-5">
            
            <!-- Header du Login -->
            <div class="text-center mb-4">
                <div class="brand-badge mb-3">⚡ APPLICATION SAAS MANAGEMENT</div>
                <h2 class="fw-bold text-dark m-0">🏥 PharmaStock</h2>
                <p class="text-muted small mt-2">Connectez-vous pour piloter votre officine</p>
            </div>

            <!-- Message d'erreur géré automatiquement par Spring Security si mauvais identifiants -->
            <div th:if="${param.error}" class="alert alert-danger border-0 small py-2 text-center" role="alert" style="border-radius: 8px;">
                🔑 Identifiant ou mot de passe incorrect.
            </div>

            <!-- Message après une déconnexion réussie -->
            <div th:if="${param.logout}" class="alert alert-success border-0 small py-2 text-center" role="alert" style="border-radius: 8px;">
                👋 Déconnexion réussie. À bientôt !
            </div>

            <!-- Formulaire relié au moteur de Spring Security -->
            <form th:action="@{/login}" method="POST">
                
                <!-- Champ Identifiant -->
                <div class="mb-3">
                    <label for="username" class="form-label small fw-medium text-secondary">Nom d'utilisateur</label>
                    <input type="text" name="username" id="username" class="form-control" placeholder="ex: admin" required autofocus>
                </div>

                <!-- Champ Mot de passe -->
                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-centerM mb-1">
                        <label for="password" class="form-label small fw-medium text-secondary m-0">Mot de passe</label>
                    </div>
                    <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <!-- Bouton Connexion -->
                <button type="submit" class="btn btn-login btn-primary w-100 text-white shadow-sm mb-3">
                    Se connecter
                </button>
                
            </form>

            <!-- Footer discret -->
            <div class="text-center mt-3">
                <span class="text-muted small">Besoin d'aide ? Contactez l'administrateur</span>
            </div>

        </div>
        
    </div>

</body>
</html>
